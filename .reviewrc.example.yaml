# Agent Review Pipeline Configuration
# Copy to .reviewrc.yaml and customize

# Files to ignore (glob patterns)
ignore:
  - "*.lock"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "*.generated.*"
  - "*.min.js"
  - "*.min.css"
  - "dist/**"
  - "build/**"
  - "node_modules/**"
  - "*.png"
  - "*.jpg"
  - "*.gif"
  - "*.svg"

# LLM model to use
# Options: claude-sonnet-4-20250514, gpt-4o, gpt-4-turbo
model: claude-sonnet-4-20250514

# Review style: concise or detailed
review_style: concise

# Auto-approve PRs with no critical or warning findings
# Default: false (always post as COMMENT unless critical issues)
auto_approve: false

# Minimum severity to post comments
# Options: critical, warning, suggestion, nitpick
severity_threshold: warning
